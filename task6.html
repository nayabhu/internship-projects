<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes App</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f6f9;
display:flex;
justify-content:center;
padding:40px;
}

.container{
width:700px;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h1{
text-align:center;
margin-bottom:20px;
color:#0077ff;
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

textarea{
height:120px;
resize:none;
}

button{
padding:12px 20px;
background:#0077ff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#0056b3;
}

.error{
color:red;
font-size:14px;
margin-bottom:8px;
}

.search{
margin-top:20px;
}

.note{
background:#f8f8f8;
padding:15px;
border-radius:10px;
margin-top:20px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.note h3{
margin-bottom:10px;
}

.note small{
display:block;
margin:10px 0;
color:#777;
}

.actions{
display:flex;
gap:10px;
margin-top:10px;
}

.edit{
background:green;
}

.delete{
background:red;
}

.edit:hover{
background:darkgreen;
}

.delete:hover{
background:darkred;
}

</style>

</head>

<body>

<div class="container">

<h1>Notes App</h1>

<input
type="text"
id="title"
placeholder="Note Title">

<div id="titleError" class="error"></div>

<textarea
id="content"
placeholder="Write your note..."></textarea>

<div id="contentError" class="error"></div>

<button id="saveBtn">
Save Note
</button>

<input
type="text"
id="search"
class="search"
placeholder="Search Notes">

<div id="notesContainer"></div>
<input type="text" id="search" class="search" placeholder="Search Notes">

<script>

const titleInput = document.getElementById("title");
const contentInput = document.getElementById("content");
const saveBtn = document.getElementById("saveBtn");

const titleError = document.getElementById("titleError");
const contentError = document.getElementById("contentError");

const notesContainer = document.getElementById("notesContainer");

let notes = [];
let editingId = null;
saveBtn.addEventListener("click", saveNote);

function saveNote(){

titleError.textContent="";
contentError.textContent="";

const title=titleInput.value.trim();
const content=contentInput.value.trim();
const searchInput = document.getElementById("search");
let valid=true;

if(title===""){

titleError.textContent="Title is required.";

valid=false;

}

if(content===""){

contentError.textContent="Content is required.";

valid=false;

}

if(!valid){

return;

}

const note={

id:Date.now(),

title:title,

content:content,

lastEdited:new Date().toLocaleString()

};

if(editingId===null){

notes.push(note);

}else{

const index = notes.findIndex(note=>note.id===editingId);

notes[index] = {

id:editingId,

title:title,

content:content,

lastEdited:new Date().toLocaleString()

};

editingId=null;

}
localStorage.setItem("notes", JSON.stringify(notes));
renderNotes();

titleInput.value="";
contentInput.value="";

}

function renderNotes(){

notesContainer.innerHTML="";

const keyword = searchInput.value.toLowerCase();

const filteredNotes = notes.filter(note =>
note.title.toLowerCase().includes(keyword) ||
note.content.toLowerCase().includes(keyword)
);

filteredNotes.forEach(note=>{

const card=document.createElement("div");

card.className="note";

card.innerHTML=`

<h3>${note.title}</h3>

<p>${note.content}</p>

<small>Last Edited: ${note.lastEdited}</small>

<div class="actions">

<button class="edit" onclick="editNote(${note.id})">Edit</button>

<button class="delete" onclick="deleteNote(${note.id})">Delete</button>

</div>

`;

notesContainer.appendChild(card);

});

}

function deleteNote(id){

notes = notes.filter(note => note.id !== id);

localStorage.setItem("notes", JSON.stringify(notes));

renderNotes();

}

function editNote(id){

const note = notes.find(note => note.id === id);

titleInput.value = note.title;

contentInput.value = note.content;

editingId = id;

}

</script>

</body>
</html>
