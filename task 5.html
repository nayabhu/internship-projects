<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{

background:white;

width:420px;

padding:25px;

border-radius:15px;

box-shadow:0 5px 20px rgba(0,0,0,.2);

}

h1{

text-align:center;

margin-bottom:20px;

color:#0077ff;

}

.search{

display:flex;

gap:10px;

margin-bottom:20px;

}

.search input{

flex:1;

padding:12px;

border:1px solid #ccc;

border-radius:8px;

font-size:16px;

}

.search button{

padding:12px 18px;

background:#0077ff;

color:white;

border:none;

border-radius:8px;

cursor:pointer;

transition:.3s;

}

.search button:hover{

background:#0056b3;

}

.loading{

display:none;

text-align:center;

color:#0077ff;

margin:15px 0;

font-weight:bold;

}

.error{

display:none;

background:#ffe5e5;

color:red;

padding:10px;

border-radius:8px;

margin-bottom:15px;

text-align:center;

}

.weather{

display:none;

text-align:center;

}

.weather img{

width:80px;

margin:10px 0;

}

.weather h2{

margin-bottom:10px;

}

.weather p{

margin:8px 0;

font-size:18px;

}

.forecast{

margin-top:25px;

display:grid;

grid-template-columns:repeat(3,1fr);

gap:10px;

}

.day{

background:#f5f5f5;

padding:15px;

border-radius:10px;

text-align:center;

transition:.3s;

}

.day:hover{

transform:translateY(-5px);

box-shadow:0 5px 12px rgba(0,0,0,.2);

}

.day img{

width:45px;

margin:8px 0;

}

@media(max-width:500px){

.container{

width:100%;

}

.forecast{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="container">

<h1>Weather Dashboard</h1>

<div class="search">

<input
type="text"
id="city"
placeholder="Enter City">

<button id="searchBtn">

Search

</button>

</div>

<div class="loading">

Loading Weather...

</div>

<div class="error">

City not found!

</div>

<div class="weather">

<h2 id="cityName"></h2>

<img id="weatherIcon">

<p id="temperature"></p>

<p id="condition"></p>

<div class="forecast">

<div class="day">

<h3>Day 1</h3>

<img id="icon1">

<p id="temp1"></p>

</div>

<div class="day">

<h3>Day 2</h3>

<img id="icon2">

<p id="temp2"></p>

</div>

<div class="day">

<h3>Day 3</h3>

<img id="icon3">

<p id="temp3"></p>

</div>

</div>

</div>


<script>
const cityInput = document.getElementById("city");
const searchBtn = document.getElementById("searchBtn");

const loading = document.querySelector(".loading");
const error = document.querySelector(".error");
const weather = document.querySelector(".weather");

const cityName = document.getElementById("cityName");
const temperature = document.getElementById("temperature");
const condition = document.getElementById("condition");

searchBtn.addEventListener("click", searchWeather);

cityInput.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        searchWeather();
    }
});

async function searchWeather(){

    const city = cityInput.value.trim();

    if(city === ""){
        alert("Please enter a city.");
        return;
    }

    loading.style.display = "block";
    error.style.display = "none";
    weather.style.display = "none";

    try{

        const geoResponse = await fetch(
            `https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1`
        );

        const geoData = await geoResponse.json();

        if(!geoData.results){
            throw new Error("City not found");
        }

        const latitude = geoData.results[0].latitude;
        const longitude = geoData.results[0].longitude;
        const cityNameResult = geoData.results[0].name;

        await getWeather(latitude, longitude, cityNameResult);

    }
    catch(err){

        loading.style.display = "none";
        error.style.display = "block";

    }

}

async function getWeather(latitude, longitude, city){

    const weatherResponse = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weather_code&daily=temperature_2m_max,weather_code&forecast_days=3&timezone=auto`
    );

    const data = await weatherResponse.json();

    loading.style.display = "none";
    weather.style.display = "block";

    cityName.textContent = city;

    temperature.textContent =
        "Temperature: " + data.current.temperature_2m + " °C";

    condition.textContent =
        "Condition: " + getWeatherName(data.current.weather_code);

    document.getElementById("weatherIcon").src =
        getWeatherIcon(data.current.weather_code);

    document.getElementById("temp1").textContent =
        data.daily.temperature_2m_max[0] + " °C";

    document.getElementById("temp2").textContent =
        data.daily.temperature_2m_max[1] + " °C";

    document.getElementById("temp3").textContent =
        data.daily.temperature_2m_max[2] + " °C";

    document.getElementById("icon1").src =
        getWeatherIcon(data.daily.weather_code[0]);

    document.getElementById("icon2").src =
        getWeatherIcon(data.daily.weather_code[1]);

    document.getElementById("icon3").src =
        getWeatherIcon(data.daily.weather_code[2]);

}

function getWeatherName(code){

    if(code === 0) return "Clear Sky";
    if(code >= 1 && code <= 3) return "Partly Cloudy";
    if(code >= 45 && code <= 48) return "Fog";
    if(code >= 51 && code <= 67) return "Rain";
    if(code >= 71 && code <= 77) return "Snow";
    if(code >= 80 && code <= 99) return "Thunderstorm";

    return "Unknown";

}

function getWeatherIcon(code){

    if(code === 0){
        return "https://cdn-icons-png.flaticon.com/512/869/869869.png";
    }

    if(code >= 1 && code <= 3){
        return "https://cdn-icons-png.flaticon.com/512/1163/1163661.png";
    }

    if(code >= 45 && code <= 48){
        return "https://cdn-icons-png.flaticon.com/512/414/414927.png";
    }

    if(code >= 51 && code <= 67){
        return "https://cdn-icons-png.flaticon.com/512/3351/3351979.png";
    }

    if(code >= 71 && code <= 77){
        return "https://cdn-icons-png.flaticon.com/512/642/642102.png";
    }

    if(code >= 80 && code <= 99){
        return "https://cdn-icons-png.flaticon.com/512/1146/1146869.png";
    }

    return "https://cdn-icons-png.flaticon.com/512/869/869869.png";

}
</script>

</body>
</html>
